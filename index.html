<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MU Market Tool</title>

<style>
body { background:#0f0f0f; color:white; font-family:Arial; }

.container {
  display:flex;
  gap:10px;
  height:80vh; /* 🔥 controla altura total */
}

.panel {
  background:#1a1a1a;
  padding:10px;
  border-radius:8px;
  display:flex;
  flex-direction:column;
}
/* 🔥 zonas scrolleables */
#setsList,
#results {
  overflow-y:auto;
  flex:1;
}

#setsPanel { width:200px; }
#editorPanel { width:300px; }
#resultsPanel { flex:1; }

#setsList::-webkit-scrollbar-thumb,
#results::-webkit-scrollbar-thumb {
  background:#444;
  border-radius:4px;
}

.setItem {
  display:flex;
  justify-content:space-between;
  padding:5px;
  border-bottom:1px solid #333;
}

.header {
  cursor:pointer;
  background:#222;
  padding:5px;
  margin-top:5px;
}

.hidden { display:none; }

.item {
  font-size:12px;
  color:#bbb;
}

.notify { color:yellow; }

/* 🔔 NOTIFY PANEL */
#notifyPanel {
  margin-top:10px;
  height:80px;
  overflow:auto;
}

.notifyItem {
  font-size:12px;
  color:orange;
}
</style>
</head>

<body>

<h2>MU Market Tool</h2>

<div class="container">

<!-- LEFT -->
<div id="setsPanel" class="panel">
  <h3>Sets</h3>

  <select id="setSelect">
    <option>Bronze</option>
    <option>Leather</option>
    <option>Pad</option>
  </select>

  <button onclick="addSet()">Agregar</button>

  <div id="setsList"></div>

  <hr>

  <button onclick="searchSelected()">Buscar seleccionados</button>
  <button onclick="toggleAutoMode()" id="autoBtn">Auto Mode OFF</button>
</div>

<!-- CENTER -->
<div id="editorPanel" class="panel">
  <h3 id="editorTitle">Editor</h3>
  <div id="editor"></div>
</div>

<!-- RIGHT -->
<div id="resultsPanel" class="panel">
  <h3>Resultados</h3>
  <div id="results"></div>
</div>

</div>

<!-- 🔔 PANEL INFERIOR -->
<div id="notifyPanel" class="panel">
  <h4>🔔 Notified Items</h4>
  <div id="notifyList"></div>
</div>

<script>

const PARTS = ["helm","armor","pants","gloves","boots"];
const OPTIONS = ["dd","dsr","iml","imsd","rd","izdr"];
const OPTION_LABELS = {
  dd: "DD",
  dsr: "DSR",
  iml: "MHP",
  imsd: "SD",
  rd: "RF",
  izdr: "ZEN"
};
const OPTION_COLORS = {
  dd: "#00ff88",
  dsr: "#66ccff",
  iml: "#ff66ff",
  imsd: "#ffaa00",
  rd: "#ff4444",
  izdr: "#ffff00"
};

let autoMode = false;
let autoInterval = null;

let sets = JSON.parse(localStorage.getItem("sets") || "[]");
let selectedSet = null;

// 🔔 estado por iteración
let notifiedThisRun = new Set();

// pedir permiso notificaciones
if (Notification.permission !== "granted") {
  Notification.requestPermission();
}

// ----------------
function save() {
  localStorage.setItem("sets", JSON.stringify(sets));
}

// ----------------
function addSet() {
  const name = document.getElementById("setSelect").value;
  if (sets.find(s => s.name === name)) return;

  const parts = {};
  PARTS.forEach(p => parts[p] = {});

  sets.push({ name, parts, enabled:true });

  save();
  renderSets();
}

// ----------------
function deleteSet(name) {
  sets = sets.filter(s => s.name !== name);
  save();
  renderSets();
}

// ----------------
function renderSets() {
  const div = document.getElementById("setsList");
  div.innerHTML = "";

  sets.forEach(set => {
    div.innerHTML += `
      <div class="setItem">
        <span onclick="selectSet('${set.name}')">${set.name}</span>

        <span>
          <input type="checkbox"
            ${set.enabled ? "checked" : ""}
            onchange="toggleSet('${set.name}', this.checked)">

          <button onclick="searchOne('${set.name}')">▶</button>
          <button onclick="deleteSet('${set.name}')">X</button>
        </span>
      </div>
    `;
  });
}

// ----------------
function toggleSet(name, val) {
  const s = sets.find(x => x.name === name);
  s.enabled = val;
  save();
}

// ----------------
function selectSet(name) {
  selectedSet = sets.find(s => s.name === name);
  renderEditor();
}

// ----------------
function renderEditor() {
  const div = document.getElementById("editor");
  if (!selectedSet) return;

  document.getElementById("editorTitle").innerText = selectedSet.name;

  let html = "";

  PARTS.forEach(part => {
    html += `<div class="header">${part}</div>`;

    OPTIONS.forEach(opt => {
      html += `
        <label>
          <input type="checkbox"
            ${selectedSet.parts[part][opt] ? "checked":""}
            onchange="toggleOpt('${part}','${OPTION_LABELS[opt]}',this.checked)">
          ${OPTION_LABELS[opt]}
        </label>
      `;
    });

    html += `
      <label>
        <input type="checkbox"
          ${selectedSet.parts[part].luck ? "checked":""}
          onchange="toggleLuck('${part}',this.checked)">
        luck
      </label>

      <label class="notify">
        <input type="checkbox"
          ${selectedSet.parts[part].notify ? "checked":""}
          onchange="toggleNotify('${part}',this.checked)">
        notify
      </label>
    `;
  });

  div.innerHTML = html;
}

// ----------------
function toggleOpt(part,opt,val) {
  selectedSet.parts[part][opt] = val;
  save();
}

function toggleLuck(part,val) {
  selectedSet.parts[part].luck = val;
  save();
}

function toggleNotify(part,val) {
  selectedSet.parts[part].notify = val;
  save();
}

// ----------------
// 🔔 NOTIFY
// ----------------
function triggerNotification(text) {

  // 🔊 sonido
  const audio = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=");
  audio.play().catch(()=>{});

  // 🪟 sistema
  if (Notification.permission === "granted") {
    new Notification("MU Market", { body: text });
  }

  // 🟠 barra windows
  if (window.api?.flash) {
    window.api.flash();
  }
}

// ----------------
// SEARCH CORE
// ----------------
async function searchOne(name, isAuto = false) {
  const set = sets.find(s => s.name === name);
  if (!set) return;

  const resultsDiv = document.getElementById("results");

  let html = `<h4>${name}</h4>`;

  for (const part of PARTS) {

    const opts = set.parts[part];

    const hasAny = OPTIONS.some(o => opts[o]) || opts.luck;
    if (!hasAny) continue;

    const filters = {};

    OPTIONS.forEach(o => {
      if (opts[o]) filters[o] = [0,1,2,3,4];
    });

    if (opts.luck) filters.hasLuck = true;

    const data = await window.api.searchLots({
      term: `${name} ${part}`,
      filters
    });

    // 🔔 NOTIFY
    if (isAuto && opts.notify && data.length > 0) {
      const key = `${name} ${part}`;

      if (!notifiedThisRun.has(key)) {
        notifiedThisRun.add(key);

        document.getElementById("notifyList").innerHTML += `
          <div class="notifyItem">${key} found</div>
        `;

        triggerNotification(`${key} found`);
      }
    }

    html += `
      <div class="header" onclick="toggle('r-${name}-${part}')">
        ${part} (${data.length})
      </div>

      <div id="r-${name}-${part}" class="hidden">
        ${data.map(x => `
          <div class="item">
            ${renderItem(x, opts)}
          </div>
        `).join("")}
      </div>
    `;

    await delay(1200);
  }

  resultsDiv.innerHTML += html;
}

// ----------------
function renderItem(item, opts) {
  const base = getPrice(item);

  let txt = "";

  OPTIONS.forEach(o => {
    if (opts[o]) {
  txt += `<span style="color:${OPTION_COLORS[o]}">[${OPTION_LABELS[o]}]</span>`;
}
  });

  if (opts.luck) txt += `[luck]`;

  return `${base} ${txt}`;
}

// ----------------
function getPrice(item) {
  const p = item.Prices || [];

  if (!p.length) return `${item.type} - no price`;

  if (p.length === 1) {
    if (p[0].Currency.code === "dc")
      return `${item.type} - ${p[0].value} dc`;

    if (p[0].Currency.code === "zen")
      return `${item.type} - ${Math.floor(p[0].value/1e6)}KK`;
  }

  return `${item.type} - multi`;
}

// ----------------
function delay(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// ----------------
// SEARCH SELECTED
// ----------------
async function searchSelected(isAuto = false) {
  const resultsDiv = document.getElementById("results");

  if (!isAuto) {
    resultsDiv.innerHTML = "Buscando...";
  } else {
    resultsDiv.innerHTML = "";
  }

  for (const s of sets) {
    if (!s.enabled) continue;

    await searchOne(s.name, isAuto);
    await delay(2500);
  }
}

// ----------------
async function runAutoSearch() {
  console.log("🔎 Auto searching...");

  // 🔥 limpiar SIEMPRE
  notifiedThisRun.clear();
  document.getElementById("notifyList").innerHTML = "";

  await searchSelected(true);
}

// ----------------
// AUTO MODE
// ----------------
function toggleAutoMode() {
  autoMode = !autoMode;

  const btn = document.getElementById("autoBtn");

  if (autoMode) {
    console.log("🟢 AUTO MODE ACTIVADO");

    btn.textContent = "Auto Mode ON";

    runAutoSearch();

    autoInterval = setInterval(() => {
      runAutoSearch();
    }, 5 * 60 * 1000);

  } else {
    console.log("🔴 AUTO MODE DESACTIVADO");

    btn.textContent = "Auto Mode OFF";

    clearInterval(autoInterval);
  }
}

// ----------------
function toggle(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle("hidden");
}

// INIT
renderSets();

</script>

</body>
</html>
