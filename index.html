<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MU Market Tool</title>

<style>
body { background:#0f0f0f; color:white; font-family:Arial; }

.container {
  display:flex;
  gap:10px;
  height:80vh; /* 🔥 controla altura total */
}
.jewel { font-weight: bold; }

.jewel-bless { color: #6904dd; }   /* azul */
.jewel-soul { color: #f02caf; }    /* violeta */
.jewel-chaos { color: #fbff01; }   /* amarillo */
.jewel-life { color: #fa9600; }    /* verde */
.jewel-creat { color: #f7004a; }   /* naranja */

.panel {
  background:#1a1a1a;
  padding:10px;
  border-radius:8px;
  display:flex;
  flex-direction:column;
}
.badge {
  display:inline-block;
  padding:2px 6px;
  margin-right:4px;
  border-radius:6px;
  font-size:11px;
  font-weight:bold;
  background:#333;
  color:white;
}
/* 🔥 zonas scrolleables */
#setsList,
#results {
  overflow-y:auto;
  flex:1;
}

#setsPanel { width:200px; }
#editorPanel { width:300px; }
#resultsPanel { flex:1; }

#setsList::-webkit-scrollbar-thumb,
#results::-webkit-scrollbar-thumb {
  background:#444;
  border-radius:4px;
}

.setItem {
  display:flex;
  justify-content:space-between;
  padding:5px;
  border-bottom:1px solid #333;
}

.header {
  cursor:pointer;
  background:#222;
  padding:5px;
  margin-top:5px;
}

.hidden { display:none; }

.item {
  font-size:12px;
  color:#bbb;
}

.notify { color:yellow; }

/* 🔔 NOTIFY PANEL */
#notifyPanel {
  margin-top:10px;
  height:80px;
  overflow:auto;
}

.notifyItem {
  font-size:12px;
  color:orange;
}
</style>
</head>

<body>

<h2>MU Market Tool</h2>

<div class="container">

<!-- LEFT -->
<div id="setsPanel" class="panel">
  <h3>Sets</h3>

<select id="setSelect">
<option>Pad</option><option>Leather</option><option>Vine</option>
<option>Bronze</option><option>Silk</option><option>Bone</option>
<option>Scale</option><option>Wind</option><option>Violent Wind</option>
<option>Sphinx</option><option>Brass</option><option>Spirit</option>
<option>Plate</option><option>Legendary</option><option>Red Winged</option>
<option>Guardian</option><option>Dragon</option><option>Light Plate</option>
<option>Sacred Fire</option><option>Ancient</option><option>Adamantine</option>
<option>Storm Crow</option><option>Storm Zahard</option>
<option>Black Dragon</option><option>Demonic</option><option>Grand Soul</option>
<option>Holy Spirit</option><option>Dark Steel</option><option>Dark Phoenix</option>
<option>Thunder Hawk</option>
</select>

  <button onclick="addSet()">Add set</button>

  <div id="setsList"></div>

  <hr>

  <button onclick="searchSelected()">Search selected</button>
  <button onclick="toggleAutoMode()" id="autoBtn">Auto Mode OFF</button>
</div>

<!-- CENTER -->
<div id="editorPanel" class="panel">
  <h3 id="editorTitle">Editor</h3>
  <div id="editor"></div>
</div>

<!-- RIGHT -->
<div id="resultsPanel" class="panel">
  <h3>Results</h3>
  <div id="results"></div>
</div>

</div>

<!-- 🔔 PANEL INFERIOR -->
<div id="notifyPanel" class="panel">
  <h4>🔔 Notified Items</h4>
  <div id="notifyList"></div>
</div>

<script>

const PARTS = ["helm","armor","pants","gloves","boots"];
const OPTIONS = ["dd","dsr","iml","imsd","rd","izdr"];
const OPTION_LABELS = {
  dd: "DD",
  dsr: "DSR",
  iml: "MHP",
  imsd: "SD",
  rd: "RF",
  izdr: "ZEN"
};
const OPTION_COLORS = {
  dd: "#00c853",
  dsr: "#00b0ff",
  iml: "#d500f9",
  imsd: "#ff9100",
  rd: "#ff1744",
  izdr: "#ffd600"
};

let autoMode = false;
let autoInterval = null;

let sets = JSON.parse(localStorage.getItem("sets") || "[]");
let selectedSet = null;

// 🔔 estado por iteración
let notifiedThisRun = new Set();

// pedir permiso notificaciones
if (Notification.permission !== "granted") {
  Notification.requestPermission();
}

// ----------------
function save() {
  localStorage.setItem("sets", JSON.stringify(sets));
}

// ----------------
function addSet() {
  const name = document.getElementById("setSelect").value;
  if (sets.find(s => s.name === name)) return;

  const parts = {};
  PARTS.forEach(p => parts[p] = {});

  sets.push({ name, parts, enabled:true });

  save();
  renderSets();
}

// ----------------
function deleteSet(name) {
  sets = sets.filter(s => s.name !== name);
  save();
  renderSets();
}

// ----------------
function renderSets() {
  const div = document.getElementById("setsList");
  div.innerHTML = "";

  sets.forEach(set => {
div.innerHTML += `
  <div class="setItem">
    <span onclick="selectSet('${set.name}')">${set.name}</span>

    <span>
      <input type="checkbox"
        ${set.enabled ? "checked" : ""}
        onchange="toggleSet('${set.name}', this.checked)">

      <button onclick="searchOne('${set.name}', false)">▶</button>
      <button onclick="deleteSet('${set.name}')" style="color:red;">X</button>
    </span>
  </div>
`;
  });
}

// ----------------
function toggleSet(name, val) {
  const s = sets.find(x => x.name === name);
  s.enabled = val;
  save();
}

// ----------------
function selectSet(name) {
  selectedSet = sets.find(s => s.name === name);
  renderEditor();
}

// ----------------
function renderEditor() {
  const div = document.getElementById("editor");
  if (!selectedSet) return;

  document.getElementById("editorTitle").innerText = selectedSet.name;

  let html = "";

  PARTS.forEach(part => {
    html += `<div class="header">${part}</div>`;

    OPTIONS.forEach(opt => {
      html += `
        <label>
          <input type="checkbox"
            ${selectedSet.parts[part][opt] ? "checked":""}
            onchange="toggleOpt('${part}','${opt}',this.checked)">
          ${OPTION_LABELS[opt]}
        </label>
      `;
    });

    html += `
      <label>
        <input type="checkbox"
          ${selectedSet.parts[part].luck ? "checked":""}
          onchange="toggleLuck('${part}',this.checked)">
        luck
      </label>

      <label class="notify">
        <input type="checkbox"
          ${selectedSet.parts[part].notify ? "checked":""}
          onchange="toggleNotify('${part}',this.checked)">
        notify
      </label>
    `;
  });

  div.innerHTML = html;
}

// ----------------
function toggleOpt(part,opt,val) {
  selectedSet.parts[part][opt] = val;
  save();
}

function toggleLuck(part,val) {
  selectedSet.parts[part].luck = val;
  save();
}

function toggleNotify(part,val) {
  selectedSet.parts[part].notify = val;
  save();
}

// ----------------
// 🔔 NOTIFY
// ----------------
function triggerNotification(text) {

  // 🔊 sonido
  const audio = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=");
  audio.play().catch(()=>{});

  // 🪟 sistema
  if (Notification.permission === "granted") {
    new Notification("MU Market", { body: text });
  }

  // 🟠 barra windows
  if (window.api?.flash) {
    window.api.flash();
  }
}

// ----------------
// SEARCH CORE
// ----------------
async function searchOne(name, isAuto = false) {
  const set = sets.find(s => s.name === name);
  if (!set) return;

  const resultsDiv = document.getElementById("results");

  let html = `<h4>${name}</h4>`;

  for (const part of PARTS) {

    const opts = set.parts[part];

    const hasAny = OPTIONS.some(o => opts[o]) || opts.luck;
    if (!hasAny) continue;

    const filters = {};

    OPTIONS.forEach(o => {
      if (opts[o]) filters[o] = [0,1,2,3,4];
    });

    if (opts.luck) filters.hasLuck = true;

    const data = await window.api.searchLots({
      term: `${name} ${part}`,
      filters
    });
    console.log("DATA RAW:", data);
  const filtered = data;

    // 🔔 NOTIFY
    if (isAuto && opts.notify && filtered.length > 0) {
      const key = `${name} ${part}`;

      if (!notifiedThisRun.has(key)) {
        notifiedThisRun.add(key);

        document.getElementById("notifyList").innerHTML += `
          <div class="notifyItem">${key} found</div>
        `;

        triggerNotification(`${key} found`);
      }
    }

const uniqueId = `r-${name}-${part}-${Date.now()}`;

html += `
  <div class="header" onclick="toggle('${uniqueId}')">
    ${part} (${filtered.length})
  </div>

  <div id="${uniqueId}" class="hidden">
    ${filtered.map(x => `
      <div class="item">
        ${renderItem(x, opts)}
      </div>
    `).join("")}
  </div>
`;

    await delay(1200);
  }

  if (!isAuto) {
  resultsDiv.innerHTML = html;   // 🔥 reemplaza
} else {
  resultsDiv.innerHTML += html;  // auto puede acumular dentro de la misma iteración
}
}

// ----------------
function renderItem(item, opts) {
  const base = getPrice(item);

  let txt = "";

  OPTIONS.forEach(o => {
    if (opts[o]) {
  txt += `<span class="badge" style="background:${OPTION_COLORS[o]}">
  ${OPTION_LABELS[o]}
</span>`;
}
  });

  if (opts.luck) txt += `[luck]`;

  return `${base} ${txt}`;
}

// ----------------
function getPrice(item) {
  const prices = item.Prices || [];

  if (!prices.length) return `${item.type} - no price`;

  // =========================
  // DC / ZEN
  // =========================
  if (prices.length === 1) {
    const p = prices[0];

    if (p.Currency?.code === "dc") {
      return `${item.type} - ${p.value} dc`;
    }

    if (p.Currency?.code === "zen") {
      return `${item.type} - ${Math.floor(p.value / 1_000_000)}KK`;
    }
  }

  // =========================
  // 💎 JOYAS (FIX REAL)
  // =========================
  const jewels = {
    bless: 0,
    soul: 0,
    chaos: 0,
    life: 0,
    creat: 0
  };

  let hasJewels = false;

  for (const p of prices) {
    const code = p.Currency?.code;

    if (jewels.hasOwnProperty(code)) {
      jewels[code] = p.value;
      hasJewels = true;
    }
  }

  if (hasJewels) {
    const txt = Object.entries(jewels)
      .filter(([_, v]) => v > 0)
      .map(([k, v]) => `<span class="jewel jewel-${k}">${v}${k}</span>`)
      .join(" ");

    return `${item.type} - ${txt}`;
  }

  // fallback
  return `${item.type} - unknown`;
}

// ----------------
function delay(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// ----------------
// SEARCH SELECTED
// ----------------
async function searchSelected(isAuto = false) {
  const resultsDiv = document.getElementById("results");

  if (!isAuto) {
    resultsDiv.innerHTML = "Buscando...";
  } else {
    resultsDiv.innerHTML = "";
  }

  for (const s of sets) {
    if (!s.enabled) continue;

    await searchOne(s.name, isAuto);
    await delay(2500);
  }
}

// ----------------
async function runAutoSearch() {
  console.log("🔎 Auto searching...");

  // 🔥 limpiar SIEMPRE
  notifiedThisRun.clear();
  document.getElementById("notifyList").innerHTML = "";

  await searchSelected(true);
}

// ----------------
// AUTO MODE
// ----------------
function toggleAutoMode() {
  autoMode = !autoMode;

  const btn = document.getElementById("autoBtn");

  if (autoMode) {
    console.log("🟢 AUTO MODE ACTIVADO");

    btn.textContent = "Auto Mode ON";

    runAutoSearch();

    autoInterval = setInterval(() => {
      runAutoSearch();
    }, 5 * 60 * 1000);

  } else {
    console.log("🔴 AUTO MODE DESACTIVADO");

    btn.textContent = "Auto Mode OFF";

    clearInterval(autoInterval);
  }
}

// ----------------
function toggle(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle("hidden");
}

// INIT
renderSets();

</script>

</body>
</html>
